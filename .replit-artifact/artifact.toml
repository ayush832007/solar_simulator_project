kind = "web"
previewPath = "/"
title = "AI Solar Cell Simulator"
version = "1.0.0"
id = "artifacts/solar-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18485

[services.development]
run = "pnpm --filter @workspace/solar-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solar-simulator", "run", "build" ]
publicDir = "artifacts/solar-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18485"
BASE_PATH = "/"
